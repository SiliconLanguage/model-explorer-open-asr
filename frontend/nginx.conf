server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large batch uploads.  Micro-batches (5 files) keep individual
    # requests small, but a generous limit avoids 413 for oversized audio.
    client_max_body_size 500m;

    # ── API proxy → FastAPI backend ─────────────────────────────────────────
    # Strips the /api prefix before forwarding so the backend routes stay clean.
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Stream uploads directly to FastAPI instead of buffering to disk.
        # Prevents hangs on slow connections where Nginx holds the entire
        # file before forwarding a single byte to the backend.
        proxy_request_buffering off;

        # SSE / chunked streaming: disable all buffering so tokens reach the
        # browser as soon as the backend writes them.
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        # Generous timeouts for large uploads + long transcription jobs.
        proxy_connect_timeout 60s;
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
    }

    # ── Static assets with long-lived cache ────────────────────────────────
    location ~* \.(js|css|wasm|woff2?|ttf|ico|png|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback – all unmatched routes serve index.html ───────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
