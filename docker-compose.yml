# Open-ASR Model Explorer – Docker Compose
# Usage:
#   docker compose up --build          # start both services
#   docker compose up --build backend  # backend only
#   docker compose down -v             # stop and remove volumes
#
# The frontend is served by Nginx on http://localhost:3000.
# The backend FastAPI API is available directly on http://localhost:8000.
# Nginx proxies /api/* → http://backend:8000/* so the UI calls /api/… .

services:

  # ── Caddy reverse-proxy / TLS termination ───────────────────────────────────
  gateway:
    image: caddy:2-alpine
    container_name: asr-gateway
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 / QUIC
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # ── FastAPI + vLLM backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Persist downloaded HuggingFace model weights across container restarts.
      - hf_cache:/hf_cache
      # Shared audio spool for async job ingestion.
      - audio_spool:/data/audio_spool
    environment:
      - HF_HOME=/hf_cache
      - TRANSFORMERS_CACHE=/hf_cache
      - HF_TOKEN=${HF_TOKEN}
      - GPU_MEMORY_UTILIZATION=${GPU_MEMORY_UTILIZATION:-0.65}
      - OPENASR_ENGINE_INIT_TIMEOUT_S=${OPENASR_ENGINE_INIT_TIMEOUT_S:-120}
      - OPENASR_VLLM_MAX_MODEL_LEN=${OPENASR_VLLM_MAX_MODEL_LEN:-8192}
      - OPENASR_VLLM_ENFORCE_EAGER=${OPENASR_VLLM_ENFORCE_EAGER:-true}
      - ALLOW_MOCK_FALLBACK=${ALLOW_MOCK_FALLBACK:-false}
      - ASR_ENGINE=${ASR_ENGINE:-hf}
      - CORS_ALLOWED_ORIGIN=${CORS_ALLOWED_ORIGIN:-*}
      # Valkey connection for async job queue
      - VALKEY_HOST=valkey
      - VALKEY_PORT=6379
      - SPOOL_DIR=/data/audio_spool
      # NCCL fixes for AWS EC2 (P2P/IB disabled on single-GPU instances)
      - NCCL_P2P_DISABLE=1
      - NCCL_IB_DISABLE=1
      # vLLM debug logging to capture silent core crashes
      - VLLM_LOG_LEVEL=DEBUG
    # GPU access – requires the NVIDIA Container Toolkit.
    # Remove the `deploy` block entirely if running CPU-only.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── React / Nginx frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Valkey (Redis-compatible) job queue ─────────────────────────────────────
  valkey:
    image: valkey/valkey:8.1
    ports:
      - "6379:6379"
    command: >
      valkey-server
        --save 60 1000
        --loglevel notice
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── Background inference worker (faster-whisper on GPU) ─────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    volumes:
      - hf_cache:/hf_cache
      - audio_spool:/data/audio_spool
    environment:
      - HF_HOME=/hf_cache
      - TRANSFORMERS_CACHE=/hf_cache
      - HF_HUB_ENABLE_HF_TRANSFER=1
      - VALKEY_HOST=valkey
      - VALKEY_PORT=6379
      - ASR_ENGINE=${ASR_ENGINE:-whisper}
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - WHISPER_DEVICE=cuda
      - WHISPER_COMPUTE=int8_float16
      - NUM_WORKERS=4
      - VIBEVOICE_MODEL=${VIBEVOICE_MODEL:-microsoft/VibeVoice-ASR-HF}
      - SPOOL_DIR=/data/audio_spool
    depends_on:
      valkey:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      disable: true
    restart: unless-stopped

volumes:
  # Named volume for HuggingFace model weight cache.
  hf_cache:
  # Caddy TLS certificates and ACME state.
  caddy_data:
  caddy_config:
  # Valkey persistence.
  valkey_data:
  # Shared audio spool between backend and worker.
  audio_spool:
